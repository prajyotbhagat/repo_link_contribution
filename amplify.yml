version: 1

applications:
  - appRoot: frontend

    frontend:
      phases:
        preBuild:
          commands:
            - npm ci --prefer-offline

        build:
          commands:
            - test -n "$VITE_API_URL"
            - npm run build

      artifacts:
        baseDirectory: dist
        files:
          - "**/*"

      cache:
        paths:
          - node_modules/**/*

      customHeaders:
        - pattern: "**/*"
          headers:
            - key: Cache-Control
              value: "public, max-age=0, must-revalidate"
