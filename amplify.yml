version: 1

applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd frontend
            - npm ci --prefer-offline

        build:
          commands:
            - cd frontend
            - VITE_API_URL=https://13-48-26-213.sslip.io npm run build

      artifacts:
        baseDirectory: frontend/dist
        files:
          - "**/*"

      cache:
        paths:
          - frontend/node_modules/**/*

      customHeaders:
        - pattern: "**/*"
          headers:
            - key: Cache-Control
              value: "public, max-age=0, must-revalidate"
