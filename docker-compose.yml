version: "3.9"

# ─── Shared config for all Django-based containers ───────────────────────────
x-django: &django
  build: .
  env_file:
    - .env
  environment:
    - DJANGO_SETTINGS_MODULE=config.settings_prod
    - REDIS_URL=redis://redis:6379/0
  depends_on:
    - redis
  restart: unless-stopped

services:
  # ─── Redis (Celery broker + cache) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ─── Django / Gunicorn ───────────────────────────────────────────────────────
  web:
    <<: *django
    command: gunicorn config.wsgi:application -c gunicorn.conf.py
    expose:
      - "8000"
    volumes:
      - static_volume:/app/staticfiles

  # ─── Celery worker (executes tasks) ──────────────────────────────────────────
  worker:
    <<: *django
    command: celery -A config worker --loglevel=info --pool=solo

  # ─── Celery Beat (schedules the daily crawler) ────────────────────────────────
  beat:
    <<: *django
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ─── Caddy reverse proxy (HTTPS via ZeroSSL) ─────────────────────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  static_volume:
  caddy_data:
  caddy_config:
  redis_data:
